<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TRCA台灣扶輪人自行車協會 對帳後台</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
<style>
:root{
  --ink:#2a1d18;--ink-soft:#8a6f63;--line:#f0e3dc;--line-soft:#f7efe9;
  --bg:#fbf6f2;--card:#ffffff;
  --brand:#e8502e;--brand-d:#c93a1c;--brand-soft:#fdeee8;
  --grad:linear-gradient(120deg,#f08a3c 0%,#e8502e 55%,#d63a28 100%);
  --grad-dark:linear-gradient(125deg,#3a2118 0%,#5a2a1a 45%,#7a3320 100%);
  --c-gray:#9a8478;--c-gray-bg:#f3ece7;--c-amber:#c47a12;--c-amber-bg:#fdf2db;
  --c-green:#1f8a52;--c-green-bg:#e3f5ea;--c-red:#d63a28;--c-red-bg:#fce7e2;
  --c-purple:#8a4fb0;--c-purple-bg:#f3eafa;--c-blue:#2980c4;--c-blue-bg:#e6f1fb;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);background-image:radial-gradient(circle at 100% 0%,rgba(240,138,60,.07),transparent 40%),radial-gradient(circle at 0% 100%,rgba(232,80,46,.05),transparent 45%);font-family:'Noto Sans TC',sans-serif;color:var(--ink);min-height:100vh;}
.mono{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums;}
.spin{animation:spin 1s linear infinite;}@keyframes spin{to{transform:rotate(360deg);}}
.icon{width:1em;height:1em;display:inline-block;vertical-align:-0.125em;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--grad-dark);position:relative;overflow:hidden;}.login-wrap::before{content:'';position:absolute;top:-30%;right:-10%;width:70%;height:160%;background:linear-gradient(120deg,rgba(240,138,60,.25),transparent 60%);transform:rotate(12deg);}
.login-card{background:var(--card);border-radius:22px;padding:40px 34px 34px;width:350px;box-shadow:0 30px 70px rgba(90,30,15,.4);position:relative;z-index:1;}.login-logo{display:block;height:50px;margin:0 auto 14px;}
.login-brand{display:flex;align-items:center;justify-content:center;gap:8px;font-size:15px;font-weight:700;color:var(--brand);letter-spacing:.5px;}
.login-sub{margin:14px 0 22px;color:var(--ink-soft);font-size:14px;}
.fld{display:block;margin-bottom:14px;}
.fld span{display:block;font-size:12.5px;color:var(--ink-soft);margin-bottom:6px;}
.fld input{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:10px;font-size:14px;outline:none;}
.fld input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(15,92,107,.12);}
.login-err{color:var(--c-red);font-size:12.5px;margin-bottom:12px;}
.login-hint{text-align:center;color:#9aa7b3;font-size:11.5px;margin-top:14px;}
.btn-primary{background:var(--grad);color:#fff;border:none;padding:12px 18px;border-radius:12px;font-size:14.5px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:7px;justify-content:center;box-shadow:0 6px 16px rgba(232,80,46,.3);transition:.18s;}
.btn-primary:hover{filter:brightness(1.05);transform:translateY(-1px);box-shadow:0 9px 22px rgba(232,80,46,.4);}
.full{width:100%;}
.btn-ghost{background:transparent;border:1px solid rgba(255,255,255,.3);color:#fff;padding:7px 12px;border-radius:8px;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
.btn-ghost:hover{background:rgba(255,255,255,.12);}
.topbar{background:var(--grad-dark);color:#fff;padding:0 26px;height:64px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 4px 20px rgba(90,30,15,.18);position:relative;overflow:hidden;}.topbar::after{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:linear-gradient(110deg,transparent,rgba(240,138,60,.18));pointer-events:none;}
.brand{display:flex;align-items:center;gap:12px;font-weight:700;font-size:15px;z-index:1;}.brand img{height:30px;display:block;}.brand .divider{width:1px;height:22px;background:rgba(255,255,255,.3);}.brand .sys-name{font-weight:500;opacity:.92;letter-spacing:.5px;}
.topbar-right{display:flex;align-items:center;gap:14px;}
.who{font-size:13px;opacity:.85;}
.body{max-width:1080px;margin:0 auto;padding:26px 26px 60px;}
.toolbar{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px;gap:16px;flex-wrap:wrap;}
.select-label{display:block;font-size:12px;color:var(--ink-soft);margin-bottom:6px;}
.select-box{position:relative;}
.select-box select{appearance:none;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px 40px 11px 15px;font-size:15px;font-weight:500;color:var(--ink);min-width:260px;max-width:420px;cursor:pointer;outline:none;}
.select-box select:focus{border-color:var(--brand);}
.select-chev{position:absolute;right:13px;top:50%;transform:translateY(-50%);color:var(--ink-soft);pointer-events:none;}
.btn-export{background:var(--card);border:1px solid var(--line);color:var(--ink);padding:11px 16px;border-radius:11px;font-size:14px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;font-weight:500;}
.btn-export:hover{border-color:var(--brand);color:var(--brand);}
.banner-err{display:flex;align-items:center;gap:8px;background:var(--c-red-bg);color:var(--c-red);padding:11px 15px;border-radius:11px;font-size:13.5px;margin-bottom:18px;}
.stat-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:11px;margin-bottom:22px;}
.stat-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 16px;text-align:left;cursor:pointer;transition:.18s;border-top:3px solid var(--accent);box-shadow:0 2px 8px rgba(120,60,30,.04);}
.stat-card:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(20,40,55,.08);}
.stat-card.active{background:var(--accent-bg);border-color:var(--accent);}
.stat-top{display:flex;align-items:center;justify-content:space-between;color:var(--accent);}
.stat-num{font-size:24px;font-weight:700;font-family:'JetBrains Mono',monospace;}
.stat-label{display:block;font-size:11.5px;color:var(--ink-soft);margin-top:4px;line-height:1.3;}
.filter-row{display:flex;align-items:center;gap:14px;margin-bottom:14px;flex-wrap:wrap;}
.search-box{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:9px 13px;flex:1;min-width:240px;color:var(--ink-soft);}
.search-box input{border:none;outline:none;font-size:14px;flex:1;color:var(--ink);background:transparent;}
.search-box .clear{cursor:pointer;}
.filter-pills{display:flex;gap:9px;}
.pill{display:inline-flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:8px 14px;font-size:13px;cursor:pointer;color:var(--ink-soft);}
.pill:hover{border-color:var(--brand);}
.pill.on{background:var(--brand);color:#fff;border-color:var(--brand);}
.pill.danger.on{background:var(--c-red);border-color:var(--c-red);}
.table-wrap{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;}
.loading{display:flex;align-items:center;justify-content:center;gap:9px;padding:48px;color:var(--ink-soft);font-size:14px;}
table{width:100%;border-collapse:collapse;font-size:14px;table-layout:fixed;}
thead th{text-align:left;padding:12px 14px;background:#f8fafc;color:var(--ink-soft);font-weight:500;font-size:12.5px;border-bottom:1px solid var(--line);}
/* 欄寬分配：編號 / 姓名 / 應繳 / 回報 / 末五碼備註(寬,可換行) / 狀態 / 操作 */
col.c-code{width:8%;} col.c-name{width:13%;} col.c-due{width:11%;} col.c-rep{width:11%;}
col.c-note{width:24%;} col.c-status{width:18%;} col.c-act{width:15%;}
th.num,td.num{text-align:right;}
th.act,td.act{text-align:center;}
tbody td{padding:12px 14px;border-bottom:1px solid var(--line-soft);vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
td.note{white-space:normal;word-break:break-word;font-size:12.5px;color:var(--ink-soft);line-height:1.45;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover{background:#fafcfe;}
.empty{text-align:center;color:var(--ink-soft);padding:40px;}
.amt-bad{color:var(--c-red);font-weight:700;}
.badge{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;font-size:11.5px;font-weight:700;white-space:nowrap;}
.dup-tag{font-style:normal;font-size:10px;opacity:.7;margin-left:2px;}
.act-btns{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;}
.btn-confirm{background:var(--c-green);color:#fff;border:none;padding:6px 11px;border-radius:7px;font-size:12.5px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;}
.btn-confirm:hover{filter:brightness(1.08);}
.btn-confirm:disabled{opacity:.6;cursor:default;}
.btn-check{background:var(--c-red-bg);color:var(--c-red);border:1px solid transparent;padding:6px 11px;border-radius:7px;font-size:12.5px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;}
.btn-check:hover{border-color:var(--c-red);}
.btn-mini{background:transparent;border:1px solid var(--line);color:var(--ink-soft);padding:6px 10px;border-radius:7px;font-size:12.5px;cursor:pointer;}
.btn-mini:hover{border-color:var(--brand);color:var(--brand);}
.foot-note{margin-top:14px;font-size:12.5px;color:var(--ink-soft);}
/* 手機卡片式列（桌機隱藏） */
.cardlist{display:none;}

/* 分頁列 */
.tabbar{display:flex;gap:4px;margin-bottom:20px;border-bottom:2px solid var(--line);}
.tabbtn{background:transparent;border:none;padding:11px 20px;font-size:14.5px;font-weight:500;color:var(--ink-soft);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;font-family:inherit;}
.tabbtn:hover{color:var(--brand);}
.tabbtn.on{color:var(--brand);border-bottom-color:var(--brand);font-weight:700;}
.toolbar-btns{display:flex;gap:9px;flex-wrap:wrap;}
.warn-btn{color:var(--c-amber);border-color:#f0d9a8;}
.warn-btn:hover{border-color:var(--c-amber);color:var(--c-amber);}

/* 總覽 */
.ov-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap;}
.ov-title{font-size:16px;font-weight:700;}
.ov-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
.ov-card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px 22px;box-shadow:0 3px 12px rgba(120,60,30,.05);transition:.18s;}.ov-card:hover{transform:translateY(-3px);box-shadow:0 12px 28px rgba(120,60,30,.1);}
.ov-name{font-size:15px;font-weight:700;margin-bottom:12px;}
.ov-bar{height:9px;background:#eef2f5;border-radius:6px;overflow:hidden;margin-bottom:8px;}
.ov-bar-fill{height:100%;background:var(--grad);border-radius:6px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.ov-pct{font-size:13px;color:var(--ink-soft);margin-bottom:12px;}
.ov-stats{display:flex;gap:10px;margin-bottom:12px;}
.ov-stat{font-size:12.5px;padding:5px 11px;border-radius:8px;background:var(--c-gray-bg);color:var(--ink-soft);}
.ov-stat b{font-size:14px;}
.ov-stat.unpaid{background:var(--c-gray-bg);}
.ov-stat.mismatch{background:var(--c-red-bg);color:var(--c-red);}
.ov-money{display:flex;justify-content:space-between;align-items:baseline;font-size:14px;padding-top:12px;border-top:1px solid var(--line-soft);}
.ov-money b{color:var(--c-green);font-size:16px;}
.ov-money-due{font-size:12px;color:var(--ink-soft);}
.ov-go{margin-top:14px;width:100%;background:transparent;border:1px solid var(--line);color:var(--brand);padding:9px;border-radius:9px;font-size:13px;cursor:pointer;font-family:inherit;}
.ov-go:hover{background:#f0f6f7;border-color:var(--brand);}
.ov-total{margin-top:18px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:15px 20px;font-size:14px;color:var(--ink-soft);text-align:center;}
.ov-total b{color:var(--ink);}
.ov-total .mono{color:var(--brand);font-size:16px;}
@media(max-width:680px){.ov-grid{grid-template-columns:1fr;}}
.drawer-mask{position:fixed;inset:0;background:rgba(15,30,40,.4);display:flex;justify-content:flex-end;z-index:50;}
.drawer{background:#fff;width:380px;max-width:90vw;height:100%;display:flex;flex-direction:column;animation:slide .22s ease;box-shadow:-10px 0 40px rgba(0,0,0,.18);}
@keyframes slide{from{transform:translateX(40px);opacity:.6;}to{transform:translateX(0);opacity:1;}}
.drawer-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--line);font-weight:700;font-size:16px;}
.drawer-body{padding:18px 22px;flex:1;overflow:auto;}
.d-row{display:flex;justify-content:space-between;padding:9px 0;font-size:14px;gap:12px;}
.d-label{color:var(--ink-soft);flex-shrink:0;}
.d-val{font-weight:500;text-align:right;}
.d-val.bad{color:var(--c-red);}
.drawer-body hr{border:none;border-top:1px solid var(--line-soft);margin:8px 0;}
.diff-note{background:var(--c-red-bg);color:var(--c-red);padding:9px 12px;border-radius:9px;font-size:13px;margin:10px 0;}
.diff-note.warn{background:var(--c-amber-bg);color:var(--c-amber);}
.drawer-foot{padding:18px 22px;border-top:1px solid var(--line);}
@media(max-width:780px){.stat-grid{grid-template-columns:repeat(3,1fr);}}

/* 窄畫面：表格轉卡片 */
@media(max-width:720px){
  .table-wrap table{display:none;}
  .cardlist{display:block;padding:10px;}
  .rec-card{border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:10px;}
  .rec-card:last-child{margin-bottom:0;}
  .rec-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px;}
  .rec-name{font-weight:700;font-size:15px;}
  .rec-code{font-size:12px;color:var(--ink-soft);font-family:'JetBrains Mono',monospace;}
  .rec-money{display:flex;gap:18px;font-size:13px;margin-bottom:8px;}
  .rec-money .lbl{color:var(--ink-soft);font-size:11.5px;display:block;}
  .rec-note{font-size:12.5px;color:var(--ink-soft);background:#f8fafc;border-radius:8px;padding:8px 10px;margin-bottom:10px;word-break:break-word;line-height:1.45;}
  .rec-actions{display:flex;gap:8px;}
  .rec-actions button{flex:1;justify-content:center;}
  .toolbar-btns{width:100%;}
  .toolbar-btns .btn-export{flex:1;justify-content:center;}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useEffect } = React;

/* ============================================================
   👉 使用前：把下面的 API_URL 換成你的 Apps Script Web App 網址
   👉 後台密碼：在 Login 元件內修改 admin / 1234
============================================================ */
const API_URL = "https://script.google.com/macros/s/AKfycbxwvJrds6qO1sQSndDaxiWrVDFcYSi_lDwSrVuuWhCvNOZNSpoX2psIiaptXjAQnLz3/exec";

// 小圖示（簡易 SVG，免外部圖示庫）
const I = {
  wallet:'<rect x="2" y="5" width="20" height="14" rx="2"/><path d="M16 12h.01M2 9h20"/>',
  search:'<circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/>',
  download:'<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>',
  check:'<path d="M20 6 9 17l-5-5"/>',
  warn:'<path d="m21.7 18-8-14a2 2 0 0 0-3.4 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.7-3z"/><path d="M12 9v4M12 17h.01"/>',
  help:'<circle cx="12" cy="12" r="10"/><path d="M9.1 9a3 3 0 0 1 5.8 1c0 2-3 3-3 3M12 17h.01"/>',
  copy:'<rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>',
  chevron:'<path d="m6 9 6 6 6-6"/>',
  logout:'<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/>',
  filter:'<path d="M22 3H2l8 9.5V19l4 2v-8.5L22 3z"/>',
  x:'<path d="M18 6 6 18M6 6l12 12"/>',
  refresh:'<path d="M3 12a9 9 0 0 1 15-6.7L21 8M21 3v5h-5M21 12a9 9 0 0 1-15 6.7L3 16M3 21v-5h5"/>',
  loader:'<path d="M12 2v4M12 18v4M4.9 4.9l2.8 2.8M16.3 16.3l2.8 2.8M2 12h4M18 12h4M4.9 19.1l2.8-2.8M16.3 7.7l2.8-2.8"/>',
};
const Icon = ({n,cls}) => <svg className={"icon "+(cls||"")} viewBox="0 0 24 24" dangerouslySetInnerHTML={{__html:I[n]}} />;

const STATUS = {UNPAID:"未匯款",PENDING:"已回報，待確認",PAID:"已匯款",MISMATCH:"金額不符",NOT_FOUND:"找不到報名資料",DUPLICATE:"重複回報"};
const META = {
  [STATUS.UNPAID]:{c:"var(--c-gray)",b:"var(--c-gray-bg)",i:"help"},
  [STATUS.PENDING]:{c:"var(--c-amber)",b:"var(--c-amber-bg)",i:"refresh"},
  [STATUS.PAID]:{c:"var(--c-green)",b:"var(--c-green-bg)",i:"check"},
  [STATUS.MISMATCH]:{c:"var(--c-red)",b:"var(--c-red-bg)",i:"warn"},
  [STATUS.NOT_FOUND]:{c:"var(--c-purple)",b:"var(--c-purple-bg)",i:"help"},
  [STATUS.DUPLICATE]:{c:"var(--c-blue)",b:"var(--c-blue-bg)",i:"copy"},
};
const fmt = (n)=> n==null?"—":"$"+Number(n).toLocaleString();
const normCode = (v)=>String(v||"").toUpperCase().replace(/\s/g,"");

function reconcile(activityId, roster, reports, confirmedSet){
  const byCode={};
  reports.forEach(r=>{const c=normCode(r.code);(byCode[c]=byCode[c]||[]).push(r);});
  const rows=[];
  roster.forEach(p=>{
    const code=normCode(p.code); const reps=byCode[code]||[];
    let status,report=null,duplicate=false;
    const done=confirmedSet.has(activityId+"|"+code)||String(p.status).trim()===STATUS.PAID;
    if(reps.length===0){status=done?STATUS.PAID:STATUS.UNPAID;}
    else{
      duplicate=reps.length>1; report=reps[reps.length-1];
      if(Number(report.amount)===Number(p.due)) status=done?STATUS.PAID:(duplicate?STATUS.DUPLICATE:STATUS.PENDING);
      else status=STATUS.MISMATCH;
    }
    rows.push({code,name:p.name,due:p.due,item:p.item,phone:p.phone,report,status,duplicate,dupCount:reps.length,inRoster:true});
  });
  Object.keys(byCode).forEach(code=>{
    if(!roster.some(p=>normCode(p.code)===code)){
      const reps=byCode[code]; const report=reps[reps.length-1];
      rows.push({code,name:report.name,due:null,item:"—",report,status:STATUS.NOT_FOUND,duplicate:reps.length>1,dupCount:reps.length,inRoster:false});
    }
  });
  return rows;
}

function Login({onLogin}){
  const [u,setU]=useState("admin"); const [p,setP]=useState(""); const [err,setErr]=useState("");
  const submit=()=>{ if(u==="admin"&&p==="1234") onLogin(); else setErr("帳號或密碼錯誤（預設 admin / 1234，請於程式內修改）"); };

function Dashboard({onLogout}){
  const [activities,setActivities]=useState([]);
  const [activityId,setActivityId]=useState("");
  const [roster,setRoster]=useState([]); const [reports,setReports]=useState([]);
  const [confirmed,setConfirmed]=useState(new Set());
  const [statusFilter,setStatusFilter]=useState("全部");
  const [mismatchOnly,setMismatchOnly]=useState(false);
  const [q,setQ]=useState(""); const [detail,setDetail]=useState(null);
  const [loading,setLoading]=useState(true); const [confirming,setConfirming]=useState(""); const [err,setErr]=useState("");
  const [tab,setTab]=useState("overview");        // overview=總覽, detail=逐筆對帳
  const [sumData,setSumData]=useState([]);          // 四活動彙總
  const [sumLoading,setSumLoading]=useState(true);

  // 載入總覽
  const loadSummary=()=>{
    setSumLoading(true);
    fetch(API_URL+"?action=summary").then(r=>r.json()).then(d=>{
      if(d.ok)setSumData(d.summary||[]);
    }).catch(()=>{}).finally(()=>setSumLoading(false));
  };
  useEffect(()=>{loadSummary();},[]);

  useEffect(()=>{
    fetch(API_URL+"?action=getActivities").then(r=>r.json()).then(d=>{
      if(d.ok&&d.activities&&d.activities.length){setActivities(d.activities);setActivityId(d.activities[0].id);}
      else{setErr(d.error||"讀取活動列表失敗");setLoading(false);}
    }).catch(()=>{setErr("無法連線到 API，請檢查 API_URL 是否正確填寫");setLoading(false);});
  },[]);

  const loadData=(id)=>{
    if(!id)return; setLoading(true);
    fetch(API_URL+"?action=getData&activity="+encodeURIComponent(id)).then(r=>r.json()).then(d=>{
      if(d.ok){setRoster(d.roster||[]);setReports(d.reports||[]);setErr("");}
      else setErr(d.error||"讀取資料失敗");
    }).catch(()=>setErr("讀取資料失敗，請稍後再試")).finally(()=>setLoading(false));
  };
  useEffect(()=>{loadData(activityId);},[activityId]);

  const rows=useMemo(()=>reconcile(activityId,roster,reports,confirmed),[activityId,roster,reports,confirmed]);
  const stats=useMemo(()=>{const s={};Object.values(STATUS).forEach(k=>s[k]=0);rows.forEach(r=>s[r.status]=(s[r.status]||0)+1);return s;},[rows]);
  const filtered=useMemo(()=>rows.filter(r=>{
    if(mismatchOnly&&r.status!==STATUS.MISMATCH)return false;
    if(statusFilter!=="全部"&&r.status!==statusFilter)return false;
    if(q.trim()){const t=q.trim().toLowerCase();if(!r.code.toLowerCase().includes(t)&&!r.name.toLowerCase().includes(t))return false;}
    return true;
  }),[rows,statusFilter,mismatchOnly,q]);

  const confirm=async(code)=>{
    setConfirming(code);
    try{
      await fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({action:"confirm",activity:activityId,code})});
      setConfirmed(prev=>new Set(prev).add(activityId+"|"+code));
    }catch{alert("寫回失敗，請稍後再試");}finally{setConfirming("");}
  };

  const exportCSV=()=>{
    const head=["協會編號","姓名","電話","報名項目","應繳金額","回報金額","末五碼","匯款日期","狀態"];
    const lines=filtered.map(r=>[r.code,r.name,r.phone||"",r.item,r.due!=null?r.due:"",r.report?r.report.amount:"",r.report?r.report.last5:"",r.report?r.report.date:"",r.status]);
    downloadCSV(head,lines,"對帳明細_"+activityId);
  };

  // 催款清單：只匯出未匯款的人（姓名、電話、編號），方便打電話/發訊息
  const exportUnpaid=()=>{
    const head=["協會編號","姓名","電話","報名項目","應繳金額","狀態"];
    const lines=rows.filter(r=>r.status===STATUS.UNPAID)
      .map(r=>[r.code,r.name,r.phone||"",r.item,r.due!=null?r.due:"",r.status]);
    if(lines.length===0){alert("這個活動沒有未繳費的人，全部都收齊囉！");return;}
    downloadCSV(head,lines,"催款清單_"+activityId);
  };

  function downloadCSV(head,lines,prefix){
    const csv=[head,...lines].map(row=>row.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(",")).join("\n");
    const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
    const url=URL.createObjectURL(blob);const a=document.createElement("a");
    a.href=url;a.download=prefix+"_"+new Date().toISOString().slice(0,10)+".csv";a.click();URL.revokeObjectURL(url);
  }

  // 收款總表：四個活動的進度與金額，給會計/上司看
  const exportSummary=()=>{
    const head=["活動","報名人數","已收人數","未收人數","金額不符","完成率","應收總額","已收金額"];
    const lines=sumData.map(s=>[s.name,s.total,s.paid,s.unpaid,s.mismatch,s.pct+"%",s.dueSum,s.paidSum]);
    const totalRow=["合計",
      sumData.reduce((a,s)=>a+s.total,0),
      sumData.reduce((a,s)=>a+s.paid,0),
      sumData.reduce((a,s)=>a+s.unpaid,0),
      sumData.reduce((a,s)=>a+s.mismatch,0),
      "",
      sumData.reduce((a,s)=>a+s.dueSum,0),
      sumData.reduce((a,s)=>a+s.paidSum,0)];
    downloadCSV(head,[...lines,totalRow],"收款總表");
  };

        <div className="topbar-right">
          <span className="who">管理員</span>
          <button className="btn-ghost" onClick={onLogout}><Icon n="logout"/> 登出</button>
        </div>
      </header>
      <div className="body">
        <div className="tabbar">
          <button className={"tabbtn"+(tab==="overview"?" on":"")} onClick={()=>{setTab("overview");loadSummary();}}>四活動總覽</button>
          <button className={"tabbtn"+(tab==="detail"?" on":"")} onClick={()=>setTab("detail")}>逐筆對帳</button>
        </div>

        {err&&<div className="banner-err"><Icon n="warn"/> {err}</div>}

        {tab==="overview"? (
          <div>
            <div className="ov-head">
              <span className="ov-title">各活動收款進度</span>
              <button className="btn-export" onClick={exportSummary}><Icon n="download"/> 匯出收款總表</button>
            </div>
            {sumLoading? <div className="loading"><Icon n="loader" cls="spin"/> 統計中…</div> :
            <div className="ov-grid">
              {sumData.map(s=>(
                <div className="ov-card" key={s.id}>
                  <div className="ov-name">{s.name}</div>
                  <div className="ov-bar"><div className="ov-bar-fill" style={{width:s.pct+"%"}}></div></div>
                  <div className="ov-pct">{s.pct}% 已收（{s.paid}/{s.total} 人）</div>
                  <div className="ov-stats">
                    <span className="ov-stat unpaid">未收 <b>{s.unpaid}</b></span>
                    <span className="ov-stat mismatch">金額不符 <b>{s.mismatch}</b></span>
                  </div>
                  <div className="ov-money">
                    <span>已收 <b className="mono">{fmt(s.paidSum)}</b></span>
                    <span className="ov-money-due">應收 <span className="mono">{fmt(s.dueSum)}</span></span>
                  </div>
                  <button className="ov-go" onClick={()=>{setActivityId(s.id);setTab("detail");}}>查看此活動明細 →</button>
                </div>
              ))}
            </div>}
            {!sumLoading&&sumData.length>0&&
              <div className="ov-total">
                合計應收 <b className="mono">{fmt(sumData.reduce((a,s)=>a+s.dueSum,0))}</b>　·　
                已收 <b className="mono">{fmt(sumData.reduce((a,s)=>a+s.paidSum,0))}</b>　·　
                尚有 <b>{sumData.reduce((a,s)=>a+s.unpaid,0)}</b> 人未繳
              </div>}
          </div>
        ) : (
        <React.Fragment>
        <div className="toolbar">
          <div className="select-wrap">
            <span className="select-label">活動</span>
            <div className="select-box">
              <select value={activityId} onChange={e=>setActivityId(e.target.value)}>
                {activities.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}
              </select>
              <span className="select-chev"><Icon n="chevron"/></span>
            </div>
          </div>
          <div className="toolbar-btns">
            <button className="btn-export" onClick={()=>loadData(activityId)}><Icon n="refresh"/> 重新整理</button>
            <button className="btn-export warn-btn" onClick={exportUnpaid}><Icon n="download"/> 匯出催款清單</button>
            <button className="btn-export" onClick={exportCSV}><Icon n="download"/> 匯出對帳明細</button>
          </div>
        </div>

        <div className="stat-grid">
          {[STATUS.UNPAID,STATUS.PENDING,STATUS.PAID,STATUS.MISMATCH,STATUS.NOT_FOUND,STATUS.DUPLICATE].map(k=>{
            const m=META[k];const active=statusFilter===k;
            return (
              <button key={k} className={"stat-card"+(active?" active":"")} style={{"--accent":m.c,"--accent-bg":m.b}} onClick={()=>setStatusFilter(active?"全部":k)}>
                <div className="stat-top"><Icon n={m.i}/><span className="stat-num">{stats[k]||0}</span></div>
                <span className="stat-label">{k}</span>
              </button>
            );
          })}
        </div>

        <div className="filter-row">
          <div className="search-box">
            <Icon n="search"/>
            <input placeholder="搜尋協會編號或姓名…" value={q} onChange={e=>setQ(e.target.value)}/>
            {q&&<span className="clear" onClick={()=>setQ("")}><Icon n="x"/></span>}
          </div>
          <div className="filter-pills">
            <button className={"pill"+(statusFilter==="全部"&&!mismatchOnly?" on":"")} onClick={()=>{setStatusFilter("全部");setMismatchOnly(false);}}><Icon n="filter"/> 全部</button>
            <button className={"pill danger"+(mismatchOnly?" on":"")} onClick={()=>{setMismatchOnly(v=>!v);setStatusFilter("全部");}}><Icon n="warn"/> 只看金額不符</button>
          </div>
        </div>

        <div className="table-wrap">
          {loading? <div className="loading"><Icon n="loader" cls="spin"/> 讀取中…</div> :
          <React.Fragment>
          <table>
            <colgroup>
              <col className="c-code"/><col className="c-name"/><col className="c-due"/>
              <col className="c-rep"/><col className="c-note"/><col className="c-status"/><col className="c-act"/>
            </colgroup>
            <thead><tr><th>協會編號</th><th>姓名</th><th className="num">應繳金額</th><th className="num">回報金額</th><th>末五碼／備註</th><th>狀態</th><th className="act">操作</th></tr></thead>
            <tbody>
              {filtered.length===0&&<tr><td colSpan={7} className="empty">沒有符合條件的資料</td></tr>}
              {filtered.map((r,i)=>{const m=META[r.status];return(
                <tr key={r.code+i}>
                  <td className="mono">{r.code}</td>
                  <td title={r.name}>{r.name}</td>
                  <td className="num mono">{fmt(r.due)}</td>
                  <td className="num mono">{r.report? <span className={r.status===STATUS.MISMATCH?"amt-bad":""}>{fmt(r.report.amount)}</span> :"—"}</td>
                  <td className="note">{r.report?(r.report.last5||"—"):"—"}</td>
                  <td><span className="badge" style={{color:m.c,background:m.b}}><Icon n={m.i}/> {r.status}{r.duplicate&&r.status!==STATUS.DUPLICATE&&<em className="dup-tag">×{r.dupCount}</em>}</span></td>
                  <td className="act"><div className="act-btns">
                    {(r.status===STATUS.PENDING||r.status===STATUS.DUPLICATE)&&<button className="btn-confirm" disabled={confirming===r.code} onClick={()=>confirm(r.code)}><Icon n={confirming===r.code?"loader":"check"} cls={confirming===r.code?"spin":""}/> 確認</button>}
                    {r.status===STATUS.MISMATCH&&<button className="btn-check" onClick={()=>setDetail(r)}><Icon n="warn"/> 檢查</button>}
                    {r.report&&<button className="btn-mini" onClick={()=>setDetail(r)}>明細</button>}
                  </div></td>
                </tr>
              );})}
            </tbody>
          </table>

          {/* 手機卡片式 */}
          <div className="cardlist">
            {filtered.length===0&&<div className="empty">沒有符合條件的資料</div>}
            {filtered.map((r,i)=>{const m=META[r.status];return(
              <div className="rec-card" key={"c"+r.code+i}>
                <div className="rec-top">
                  <div>
                    <div className="rec-name">{r.name}</div>
                    <div className="rec-code">編號 {r.code}</div>
                  </div>
                  <span className="badge" style={{color:m.c,background:m.b}}><Icon n={m.i}/> {r.status}{r.duplicate&&r.status!==STATUS.DUPLICATE&&<em className="dup-tag">×{r.dupCount}</em>}</span>
                </div>
                <div className="rec-money">
                  <div><span className="lbl">應繳</span><span className="mono">{fmt(r.due)}</span></div>
                  <div><span className="lbl">回報</span><span className={"mono"+(r.status===STATUS.MISMATCH?" amt-bad":"")}>{r.report?fmt(r.report.amount):"—"}</span></div>
                </div>
                {r.report&&r.report.last5&&<div className="rec-note">{r.report.last5}</div>}
                <div className="rec-actions">
                  {(r.status===STATUS.PENDING||r.status===STATUS.DUPLICATE)&&<button className="btn-confirm" disabled={confirming===r.code} onClick={()=>confirm(r.code)}><Icon n={confirming===r.code?"loader":"check"} cls={confirming===r.code?"spin":""}/> 確認</button>}
                  {r.status===STATUS.MISMATCH&&<button className="btn-check" onClick={()=>setDetail(r)}><Icon n="warn"/> 檢查</button>}
                  {r.report&&<button className="btn-mini" onClick={()=>setDetail(r)}>明細</button>}
                </div>
              </div>
            );})}
          </div>
          </React.Fragment>}
        </div>

        <div className="foot-note">目前顯示：<b>{actName}</b> ／ 共 {filtered.length} 筆（名單 {roster.length} 人、回報 {reports.length} 筆）</div>
        </React.Fragment>
        )}
      </div>

      {detail&&<div className="drawer-mask" onClick={()=>setDetail(null)}>
        <div className="drawer" onClick={e=>e.stopPropagation()}>
          <div className="drawer-head"><span>對帳明細</span><span onClick={()=>setDetail(null)} style={{cursor:"pointer"}}><Icon n="x"/></span></div>
          <div className="drawer-body">
            <DRow label="協會編號" value={detail.code} mono/>
            <DRow label="姓名" value={detail.name}/>
            <DRow label="電話" value={detail.phone||"—"} mono/>
            <DRow label="報名項目" value={detail.item}/>
            <DRow label="應繳金額" value={fmt(detail.due)} mono/>
            <hr/>
            {detail.report? <React.Fragment>
              <DRow label="回報金額" value={fmt(detail.report.amount)} mono bad={detail.status===STATUS.MISMATCH}/>
              {detail.status===STATUS.MISMATCH&&<div className="diff-note">差額 {fmt(detail.report.amount-detail.due)}</div>}
              <DRow label="末五碼" value={detail.report.last5} mono/>
              <DRow label="匯款日期" value={detail.report.date}/>
              <DRow label="匯款時間" value={detail.report.time||"—"}/>
              {detail.dupCount>1&&<div className="diff-note warn">此編號共有 {detail.dupCount} 筆回報，請確認是否重複</div>}
            </React.Fragment> : <div className="diff-note">尚無匯款回報</div>}
            {detail.status===STATUS.NOT_FOUND&&<div className="diff-note warn">此回報的協會編號不在報名名單中</div>}
          </div>
          <div className="drawer-foot">
            {(detail.status===STATUS.PENDING||detail.status===STATUS.DUPLICATE||detail.status===STATUS.MISMATCH)&&detail.inRoster&&
              <button className="btn-primary full" onClick={()=>{confirm(detail.code);setDetail(null);}}><Icon n="check"/> 確認收款</button>}
          </div>
        </div>
      </div>}
    </div>
  );
}

function DRow({label,value,mono,bad}){
  return <div className="d-row"><span className="d-label">{label}</span><span className={"d-val"+(mono?" mono":"")+(bad?" bad":"")}>{value}</span></div>;
}

function App(){
  const [logged,setLogged]=useState(false);
  return logged? <Dashboard onLogout={()=>setLogged(false)}/> : <Login onLogin={()=>setLogged(true)}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
